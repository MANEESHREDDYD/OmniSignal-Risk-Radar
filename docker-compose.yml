services:
  backend:
    build: ./backend
    environment:
      DEMO_MODE: "true"
      FRONTEND_ORIGIN: http://localhost:3000
    ports:
      - "8000:8000"
    volumes:
      - omnisignal-data:/app/data

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000/api
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  omnisignal-data:

